name: Deploy AlphaVerse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run database schema migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Use direct connection (not pooler) so DDL + NOTIFY work correctly
          psql "postgresql://postgres.zodriqdrbbidwgtlehvp@db.zodriqdrbbidwgtlehvp.supabase.co:5432/postgres" \
            -f supabase/schema.sql \
            --set ON_ERROR_STOP=off \
            -v ON_ERROR_STOP=0
          echo "✅ Schema migration complete"
